.stats{padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.stat-n{font-size:20px;font-weight:800;color:#2c3e50;}

.city-img-wrap{position:relative;height:180px;overflow:hidden;background:#333;}
.back-btn{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;z-index:2;}

.city-img-title{font-size:20px;font-weight:800;}
.city-img-date{font-size:13px;opacity:.9;}
.city-img-hotel{font-size:11px;opacity:.8;margin-top:2px;}

.ev-inner{display:flex;gap:10px;align-items:flex-start;}

.ev-detail{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
.ev-cost{margin-top:6px;display:inline-block;background:#e8f8e8;color:#27ae60;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;}
.ev-alert{margin-top:4px;display:inline-block;background:#fdecea;color:#e74c3c;font-size:10px;padding:2px 8px;border-radius:6px;margin-left:4px;}

.tip-box{background:#eaf4ff;border-radius:10px;padding:10px 14px;margin:0 16px 14px;font-size:12px;color:#1a5276;}

.num-n{font-weight:800;font-size:16px;}

function countdown(){
  const now = new Date();
  const diff = Math.ceil((TRIP_START - now) / 86400000);
  const el = document.getElementById("hcount");
  const ll = document.getElementById("hlabel");
  if(!el) return;
  if(diff > 0){ el.textContent = diff; ll.textContent = "días para el viaje"; }
  else if(diff > -22){ el.textContent = "Día "+(Math.abs(diff)); ll.textContent = "¡Estás viajando!"; el.style.color="#2ecc71"; }
  else { el.textContent = "✓"; ll.textContent = "Viaje completado"; }
}

function render(){
  countdown();
  renderNav();
  const c = document.getElementById("content");
  if(curTab==="inicio") c.innerHTML = renderInicio();
  else if(curTab==="itinerario") c.innerHTML = selDay ? renderDayDetail(selDay) : renderItinerary();
  else if(curTab==="hoteles") c.innerHTML = renderHoteles();
  else if(curTab==="costos") c.innerHTML = renderCostos();
  else if(curTab==="frases") c.innerHTML = renderFrases();
  else if(curTab==="alertas") c.innerHTML = renderAlertas();
  bindEvents();
}

function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>`
    <button class="nav-btn" onclick="goTab('${t.id}')">
      <span class="nav-ic">${t.ic}</span>
      <span class="nav-lbl" style="color:${curTab===t.id?'#e74c3c':'#999'};font-weight:${curTab===t.id?700:400}">${t.lbl}</span>
      ${curTab===t.id?'<div class="nav-dot"></div>':''}
    </button>`).join("");
}

function goTab(id){ curTab=id; selDay=null; openCat=null; render(); window.scrollTo(0,0); }

function renderInicio(){
  const now = new Date();
  const diff = Math.ceil((TRIP_START - now)/86400000);
  let banner = diff > 0
    ? `<div class="banner"><div class="banner-num">${diff}</div><div class="banner-label">días hasta el despegue 🛫</div><div class="banner-sub">2 de mayo 2026 · Córdoba → Madrid</div></div>`
    : `<div class="banner"><div style="font-size:32px;font-weight:900">¡Estás viajando! 🎉</div></div>`;

  const cities = Object.entries(CITY_EMOJI).map(([k,e])=>`
    <div class="city-chip" style="border-left:4px solid ${CITY_COLORS[k]}" onclick="goTab('itinerario')">
      <span style="font-size:20px">${e}</span><span>${k.charAt(0).toUpperCase()+k.slice(1)}</span>
    </div>`).join("");

  const stats = [["22","Días","📆"],["13","Ciudades","🏙️"],["5","Países","🌍"],["8+","Hoteles","🏨"],["12+","Vuelos/Trenes","🚆"],["50+","Atracciones","🎟️"]]
    .map(([n,l,i])=>`<div class="stat-card"><div class="stat-ic">${i}</div><div class="stat-n">${n}</div><div class="stat-l">${l}</div></div>`).join("");

  const confirmed = [
    ["🚆","Tren Madrid↔Toledo (10:15/16:25) — Día 2"],
    ["🚆","Tren Madrid→Córdoba OUIGO (09:55) — Día 3"],
    ["🚆","Tren Córdoba→Sevilla (19:00) — Día 3"],
    ["🚆","Tren Sevilla→Málaga Avant (10:35) — Día 5"],
    ["✈️","Vuelo Málaga→Lisboa — Día 7"],
    ["🎫","Excursión Sintra Booking (08:30) — Día 8"],
    ["🚆","Tren Venecia→Florencia — Día 15"],
    ["🚆","Tren Florencia→Roma — Día 17"],
    ["🚆","Tren Roma→Nápoles — Día 19"],
    ["🎫","Tour Costa Amalfitana Booking (08:10) — Día 20"],
    ["✈️","Vuelo Nápoles→Madrid — Día 21"],
    ["✈️","Vuelo regreso MAD→COR (nocturno) — Día 22"],
  ].map(([i,t])=>`<div class="conf-item"><span style="font-size:18px">${i}</span><span>${t}</span></div>`).join("");

  return `${banner}
    <div class="section-title">📍 CIUDADES DEL VIAJE</div>
    <div class="cities">${cities}</div>
    <div class="section-title">📊 ESTADÍSTICAS</div>
    <div class="stats">${stats}</div>
    <div class="section-title">✅ BOLETOS Y TOURS CONFIRMADOS</div>
    <div class="confirmed-list">${confirmed}</div>`;
}

function renderItinerary(){
  return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 12px">📅 ITINERARIO COMPLETO</div>
    ${ITINERARY.map(d=>`
      <div class="day-card" style="border-left:5px solid ${CITY_COLORS[d.city]||'#555'}" onclick="openDay(${d.day})">
        <div class="day-badge" style="background:${CITY_COLORS[d.city]||'#555'}">${d.day}</div>
        <div style="flex:1">
          <div class="day-title">${d.label}</div>
          <div class="day-sub">${d.date} · ${d.events.length} eventos</div>
        </div>
        <span style="font-size:18px">${CITY_EMOJI[d.city]||''}</span>
      </div>`).join("")}
  </div>`;
}

function openDay(n){ selDay = ITINERARY.find(d=>d.day===n); render(); window.scrollTo(0,0); }

function renderDayDetail(d){
  const col = CITY_COLORS[d.city]||"#555";
  const img = CITY_IMGS[d.city]||"";
  const events = d.events.map(ev=>`
    <div class="ev-card" style="border-left:4px solid ${ev.alert?'#e74c3c':'#ecf0f1'}">
      <div class="ev-inner">
        <span class="ev-ic">${ev.type}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <span class="ev-title">${ev.title}</span>
            ${ev.time?`<span class="ev-time">${ev.time}</span>`:''}
          </div>
          <div class="ev-detail">${ev.detail}</div>
          ${ev.cost?`<span class="ev-cost">💶 ${ev.cost}</span>`:''}
          ${ev.alert?`<span class="ev-alert">⚠️ Reservar con anticipación</span>`:''}
        </div>
      </div>
    </div>`).join("");

  return `
    <div class="city-img-wrap">
      <img class="city-img" src="${img}" onerror="this.style.display='none'" alt="${d.city}"/>
      <div class="city-img-overlay"></div>
      <button class="back-btn" onclick="selDay=null;render()">← Volver</button>
      <div class="city-img-info">
        <div class="city-img-title">${d.label}</div>
        <div class="city-img-date">${d.date}</div>
        ${d.hotel?`<div class="city-img-hotel">🏨 ${d.hotel}</div>`:''}
      </div>
    </div>
    <div style="padding:16px">${events}</div>`;
}

function renderHoteles(){
  return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 12px">🏨 ALOJAMIENTOS</div>
    ${HOTELS.map(h=>`
      <div class="hotel-card">
        <div style="display:flex;justify-content:space-between">
          <div>
            <div class="hotel-name">${h.name}</div>
            <div class="hotel-city">📍 ${h.city} — ${h.days}</div>
            <div class="hotel-addr">📫 ${h.addr}</div>
            ${h.phone?`<div class="hotel-phone">📞 <a href="tel:${h.phone}" style="color:#3498db">${h.phone}</a></div>`:''}
          </div>
        </div>
      </div>`).join("")}
  </div>`;
}

function renderCostos(){
  const rows = COSTS.map(c=>`
    <div class="cost-row">
      <div><div class="cost-city">${c.city}</div><div class="cost-days">${c.days}</div></div>
      <div class="cost-badge">${c.est}</div>
    </div>`).join("");
  const tickets = TICKETS.map(t=>`
    <div class="ticket-row">
      <div><div class="ticket-name">${t.name}</div><div class="ticket-url">${t.url}</div></div>
      <div class="ticket-price">${t.price}</div>
    </div>`).join("");
  return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 8px">💶 ESTIMADO ATRACCIONES POR CIUDAD</div>
    <div class="info-box">ℹ️ Solo entradas y atracciones. No incluye vuelos, hoteles ni comidas.</div>
    ${rows}
    <div class="cost-total">
      <div><div style="font-weight:700;font-size:14px">TOTAL ESTIMADO</div><div style="font-size:11px;opacity:.8">Solo atracciones y entradas</div></div>
      <div style="font-size:22px;font-weight:900;color:#f39c12">~700–1040€</div>
    </div>
    <div class="section-title" style="padding:16px 0 10px">🎟️ ENTRADAS A COMPRAR ONLINE</div>
    ${tickets}
  </div>`;
}

function renderFrases(){
  const data = FRASES[curLang];
  const langBtns = Object.entries(FRASES).map(([k,v])=>`
    <button class="lang-btn" onclick="curLang='${k}';openCat=null;render()"
      style="border-color:${curLang===k?v.color:'#ddd'};background:${curLang===k?v.color:'#fff'};color:${curLang===k?'#fff':'#555'}">
      ${v.label}
    </button>`).join("");

  const cats = data.cats.map((cat,ci)=>`
    <div style="margin:0 16px 10px">
      <button class="cat-btn ${openCat===ci?'open':''}" style="background:${data.color}" onclick="openCat=${openCat===ci?-1:ci};render()">
        <span>${cat.cat}</span><span>${openCat===ci?'▲':'▼'}</span>
      </button>
      ${openCat===ci?`<div class="phrase-list">
        ${cat.items.map((item,ii)=>`
          <div class="phrase-item" onclick="copyPhrase('${ii}-${ci}','${item.tr.replace(/'/g,"\\'")}')">
            <div>
              <div class="phrase-es">${item.es}</div>
              <div class="phrase-tr">${item.tr}</div>
              <div class="phrase-pron" style="color:${data.color}">/${item.pron}/</div>
            </div>
            <span id="copy-${ii}-${ci}" style="font-size:16px;color:#bbb">📋</span>
          </div>`).join("")}
      </div>`:''}
    </div>`).join("");

  const nums = data.nums.map(([n,w])=>`
    <div class="num-cell">
      <div class="num-n" style="color:${data.color}">${n}</div>
      <div class="num-w">${w}</div>
    </div>`).join("");

  return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 12px">💬 FRASES ÚTILES</div>
    <div class="lang-btns">${langBtns}</div>
    <div class="tip-box">💡 Tocá una frase para copiarla. La pronunciación aproximada aparece en <em>cursiva</em>.</div>
    ${cats}
    <div style="margin:0 16px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
      <div style="font-weight:700;font-size:13px;margin-bottom:10px;color:${data.color}">🔢 Números útiles</div>
      <div class="nums-grid">${nums}</div>
    </div>
  </div>`;
}

function copyPhrase(id, txt){
  navigator.clipboard?.writeText(txt).catch(()=>{});
  const el = document.getElementById("copy-"+id);
  if(el){ el.textContent="✅"; setTimeout(()=>{ if(el) el.textContent="📋"; },1500); }
}

function renderAlertas(){
  const alerts = [];
  ITINERARY.forEach(d => d.events.forEach((ev,i) => {
    if(ev.alert) alerts.push({id:`${d.day}-${i}`,day:d.day,date:d.date,ev});
  }));
  const active = alerts.filter(a=>!dismissed.includes(a.id));
  if(!active.length) return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 12px">🔔 ALERTAS</div>
    <div style="text-align:center;padding:40px;color:#888"><div style="font-size:40px">✅</div><div style="margin-top:8px">¡Todas las alertas revisadas!</div></div>
    <div class="pwa-box">💡 <strong>Tip:</strong> Para instalar esta app en tu celular Android, abrila en Chrome → menú ⋮ → "Agregar a pantalla de inicio".</div>
  </div>`;

  return `<div style="padding:16px">
    <div class="section-title" style="padding:0 0 12px">🔔 ALERTAS Y RECORDATORIOS</div>
    ${active.slice(0,20).map(a=>`
      <div class="alert-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div class="alert-day">DÍA ${a.day} · ${a.date}</div>
            <div class="alert-title">${a.ev.type} ${a.ev.title}</div>
            <div class="alert-detail">${a.ev.detail}</div>
            ${a.ev.time?`<div class="alert-time">⏰ ${a.ev.time} h</div>`:''}
          </div>
          <button class="dismiss-btn" onclick="dismiss('${a.id}')">✓ OK</button>
        </div>
      </div>`).join("")}
    <div class="pwa-box" style="margin-top:8px">💡 <strong>Tip:</strong> Para instalar esta app en Android, abrila en Chrome → menú ⋮ → "Agregar a pantalla de inicio".</div>
  </div>`;
}

function dismiss(id){ dismissed.push(id); saveState(); render(); }

function bindEvents(){ /* all inline */ }

render();
</script>
</body>
</html>
